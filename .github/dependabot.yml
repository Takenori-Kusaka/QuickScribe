# 依存関係の自動追従（whisper-rs=whisper.cpp/ggml の更新で精度向上・セキュリティ修正を取り込む）。
# Dependabot が更新PRを起票し、CI(ビルド/単体/E2E/決定論文字起こし)で検証してからマージする。
version: 2
updates:
  # Rust クレート（whisper-rs / symphonia / tauri / ureq 等）
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    groups:
      tauri:
        patterns:
          - "tauri*"
      whisper-audio:
        patterns:
          - "whisper-rs"
          - "symphonia*"
    ignore:
      # quick-xml は plist(macOS bundler=ビルド系・実行時に未信頼XMLを解析しない=攻撃経路外)
      # 経由の推移依存。plist 1.9.0 が `quick-xml ^0.39.2`(<0.40) を固定するため、patched の
      # 0.40+ (RUSTSEC-2026-0194/0195 修正版)へは到達できない(#526)。cargo audit は当該2件を
      # security.yml で --ignore 済み。単体の quick-xml bump PR は plist 制約で成立しないため、
      # Dependabot の security 更新PRを根拠を持って無視する。
      # ★解除条件: plist が quick-xml 要求を 0.40+ へ引き上げた新版を出したら、cargo update -p plist
      #   で追随し、この ignore と security.yml の --ignore を除去して #526 をクローズする。
      - dependency-name: "quick-xml"
      # whisper-rs 0.15+ は API破壊的変更(full_n_segments/full_get_segment_text 等)に加え
      # whisper-rs-sys ^0.15 を要求し、ADR-0012 の vendoring([patch.crates-io] →
      # vendor/whisper-rs-sys-0.13.1)が版不一致で無効化される(Windows マルチSIMD 配布が
      # サイレントに壊れる)。0.16 移行は API追随＋sys 再vendoring＋ADR更新を伴う計画作業
      # として別issueで実施するため、それまで minor/major バンプPRを抑止する。
      # ★解除条件: 移行issueの完了(stt.rs のAPI追随・vendor/whisper-rs-sys-0.15.x 再作成)。
      - dependency-name: "whisper-rs"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"

  # npm 依存（@tauri-apps/* / svelte / vite / vitest / wdio 等）
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    groups:
      tauri-js:
        patterns:
          - "@tauri-apps/*"
      dev-tooling:
        patterns:
          - "@wdio/*"
          - "vite"
          - "vitest"
          - "svelte*"

  # GitHub Actions（ワークフローのアクション更新）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
