name: Test build (manual, no release)

# 実機確認用の Windows インストーラを「公開リリースせず・updater(latest.json)も更新せず」
# Actions の成果物としてだけ生成する。既存ユーザーへ自動配信されないため、未検証の変更を
# 安全に実機で試せる（CIのコンパイル通過≠GUI動作、の検証ギャップを埋める手段）。
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "ビルド対象の branch / tag / SHA"
        required: false
        default: ""
      vulkan:
        description: "GPU(Vulkan)変種をビルドする(ADR-0028)。既定配布ビルドの検証用"
        required: false
        type: boolean
        default: false
      diarization:
        description: "話者特定(S2.5/ADR-0031)を含めてビルドする。ネイティブlibはオンデマンドDLのため同梱されない"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# release.yml と同じ CMake 回避策（古いlibopusの cmake_minimum_required<3.5 対策）。
env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  test-build:
    name: test-build (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set LIBCLANG_PATH (for whisper-rs bindgen)
        run: echo "LIBCLANG_PATH=$((Get-Command clang).Source | Split-Path)" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Generate THIRD-PARTY-NOTICES (cargo-about / 法的MUST・ADR-0010)
        shell: bash
        run: |
          cargo install cargo-about --locked --features cli
          cd src-tauri
          cargo about generate about.hbs > THIRD-PARTY-NOTICES.txt
          wc -l THIRD-PARTY-NOTICES.txt

      # --- Vulkan変種(ADR-0028 / inputs.vulkan=true のみ) ---
      # whisper.cpp の GGML_VULKAN ビルドは Vulkan ヘッダ / vulkan-1.lib / glslc(シェーダコンパイラ)を要する。
      # LunarG 公式インストーラをサイレント導入し VULKAN_SDK を設定する(DLL同梱は不要=ランタイムはドライバ由来)。
      - name: Install Vulkan SDK (for whisper.cpp vulkan backend build)
        if: ${{ inputs.vulkan }}
        shell: pwsh
        run: |
          # 既知良好版にピン留め(ADR-0012 決定的ビルド / LunarGの破壊的更新でリリースが赤化するのを防ぐ)。
          # 更新は明示的なPRで(実機Vulkan動作を確認のうえ版を上げる)。
          $ver = "1.4.350.0"
          Write-Host "Vulkan SDK version (pinned): $ver"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/vulkansdk-windows-X64-$ver.exe"
          $exe = "$env:RUNNER_TEMP\vulkan-sdk-installer.exe"
          Invoke-WebRequest -Uri $url -OutFile $exe
          Start-Process -FilePath $exe -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" -Wait
          $sdk = "C:\VulkanSDK\$ver"
          if (-not (Test-Path $sdk)) { throw "Vulkan SDK not found at $sdk" }
          "VULKAN_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$sdk\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # updater が公開鍵設定済みのため tauri build は updater 成果物の署名を要求する。
      # ここでは公開リリースも latest.json 発行もしない（成果物アップロードのみ）が、
      # ビルドを完走させるため release.yml と同じ署名鍵を渡す。
      # 有効化する Cargo feature を合成（vulkan / diarization を独立トグル）。
      - name: Compute cargo features
        id: feat
        shell: pwsh
        run: |
          $f = @()
          if ('${{ inputs.vulkan }}' -eq 'true') { $f += 'vulkan' }
          if ('${{ inputs.diarization }}' -eq 'true') { $f += 'diarization' }
          $arg = if ($f.Count -gt 0) { '--features ' + ($f -join ',') } else { '' }
          "args=$arg" >> $env:GITHUB_OUTPUT
          Write-Host "features arg: $arg"

      - name: Build Windows installer (bundle)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --config src-tauri/tauri.release.conf.json ${{ steps.feat.outputs.args }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: quickscribe-windows-test-build
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14
