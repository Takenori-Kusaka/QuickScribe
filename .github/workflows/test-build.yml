name: Test build (manual, no release)

# 実機確認用の Windows インストーラを「公開リリースせず・updater(latest.json)も更新せず」
# Actions の成果物としてだけ生成する。既存ユーザーへ自動配信されないため、未検証の変更を
# 安全に実機で試せる（CIのコンパイル通過≠GUI動作、の検証ギャップを埋める手段）。
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "ビルド対象の branch / tag / SHA"
        required: false
        default: ""
      cuda:
        description: "GPU(CUDA)変種をビルドする(ADR-0027)。NVIDIA GPU実機での検証用"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# release.yml と同じ CMake 回避策（古いlibopusの cmake_minimum_required<3.5 対策）。
env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  test-build:
    name: test-build (windows)
    # cuda=true は windows-2022(VS2022) 固定: windows-latest の VS18 は CUDA 12.8 nvcc が拒否する。
    runs-on: ${{ inputs.cuda && 'windows-2022' || 'windows-latest' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set LIBCLANG_PATH (for whisper-rs bindgen)
        run: echo "LIBCLANG_PATH=$((Get-Command clang).Source | Split-Path)" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Generate THIRD-PARTY-NOTICES (cargo-about / 法的MUST・ADR-0010)
        shell: bash
        run: |
          cargo install cargo-about --locked --features cli
          cd src-tauri
          cargo about generate about.hbs > THIRD-PARTY-NOTICES.txt
          wc -l THIRD-PARTY-NOTICES.txt

      # --- CUDA変種(ADR-0027 / inputs.cuda=true のみ) ---
      # 注意: ilammy/msvc-dev-cmd は必ず cargo-about(THIRD-PARTY生成)より後に置く。
      # MSVC環境をPATHへ展開すると、bashステップの cargo が Git の /usr/bin/link と衝突しリンク失敗する。
      - uses: Jimver/cuda-toolkit@v0.2.21
        if: ${{ inputs.cuda }}
        with:
          cuda: "12.8.0"
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "nvrtc_dev", "thrust"]'
      - name: Setup MSVC dev env (CUDA/Ninja)
        if: ${{ inputs.cuda }}
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
      - name: Set CUDA build env
        if: ${{ inputs.cuda }}
        shell: bash
        run: |
          {
            echo "CMAKE_GENERATOR=Ninja"
            echo "CMAKE_CUDA_ARCHITECTURES=61;75;86;89"
          } >> "$GITHUB_ENV"
      - name: Stage CUDA runtime DLLs
        if: ${{ inputs.cuda }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/cuda-dlls | Out-Null
          $bin = Join-Path $env:CUDA_PATH "bin"
          Copy-Item "$bin/cudart64_*.dll" src-tauri/cuda-dlls/
          Copy-Item "$bin/cublas64_*.dll" src-tauri/cuda-dlls/
          Copy-Item "$bin/cublasLt64_*.dll" src-tauri/cuda-dlls/

      # updater が公開鍵設定済みのため tauri build は updater 成果物の署名を要求する。
      # ここでは公開リリースも latest.json 発行もしない（成果物アップロードのみ）が、
      # ビルドを完走させるため release.yml と同じ署名鍵を渡す。
      - name: Build Windows installer (bundle)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --config src-tauri/tauri.release.conf.json ${{ inputs.cuda && '--config src-tauri/tauri.cuda.conf.json --features cuda' || '' }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: quickscribe-windows-test-build
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 14
