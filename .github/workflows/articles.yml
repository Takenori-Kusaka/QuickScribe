name: Articles

# 技術記事の校正・図生成の品質ゲート（発信は Zenn 一本。Qiita は不採用）。
# - textlint（preset-ja-technical-writing）で books/（連載＝Zenn Book の章）の日本語校正を
#   ゼロエラー必須にする。単発記事を置く場合は articles/ も対象。
# - C4 図（docs/architecture/*.dsl）を Structurizr CLI → C4-PlantUML → 決定的 PNG に書き出し、
#   Zenn 作法で参照する images/c4/ を最新化する（決定的なので通常は差分ゼロ＝churnしない）。
# - クラス図・ER 図は Mermaid をインラインで書き、Zenn/GitHub が直接描画する（画像生成は不要）。
# 方針の詳細: docs/process/article-publishing-policy.md

on:
  pull_request:
    paths:
      - "books/**"
      - "articles/**"
      - "docs/architecture/**"
      - "images/c4/**"
      - "scripts/render-structurizr.mjs"
      - ".textlintrc.json"
      - ".github/workflows/articles.yml"
  push:
    branches: [main]
    paths:
      - "books/**"
      - "articles/**"
      - "docs/architecture/**"
      - "images/c4/**"
      - "scripts/render-structurizr.mjs"
      - ".github/workflows/articles.yml"
  workflow_dispatch:

concurrency:
  group: articles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  textlint:
    name: textlint (articles)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: textlint (preset-ja-technical-writing)
        run: npm run lint:text

  structurizr:
    name: structurizr (dsl -> plantuml -> deterministic png)
    runs-on: ubuntu-22.04
    # Render inside a container that bundles structurizr-cli + plantuml + graphviz + git,
    # so no setup-java / CLI download is needed. Proven pattern:
    # sebastienfi/structurizr-github-actions-demo.
    #   structurizr.sh export -format plantuml  ->  plantuml -tpng  ->  DETERMINISTIC PNG
    # PNGs are byte-identical for unchanged DSL (Graphviz layout, no random IDs), so we
    # render on both PR and main and commit ONLY when the bytes actually change => no churn.
    # The job goes red only when a .dsl fails to render (e.g. a DSL syntax error).
    container: ghcr.io/sebastienfi/structurizr-cli-with-bonus:latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Check out the PR branch itself (not the detached merge ref) so we can push
          # regenerated images back to it. On main pushes this resolves to main.
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Install npm dependencies
        run: npm ci
      - name: Install CJK fonts for PlantUML
        # PlantUML renders diagram text with Java2D. The base image ships a CJK font for
        # regular weight only, so BOLD Japanese (C4 element/boundary titles) falls back to
        # a non-CJK bold face and renders as tofu (□). Noto CJK ships a Bold weight, so
        # installing it (and refreshing the font cache) fixes the bold Japanese titles.
        run: |
          apt-get update -qq
          apt-get install -y -qq fonts-noto-cjk
          fc-cache -f
      - name: Render DSL to deterministic PNGs (structurizr -> plantuml)
        # A DSL syntax error makes this exit non-zero -> the check goes red.
        run: npm run structurizr
      - name: Commit images when they changed (deterministic => usually no-op)
        run: |
          # The container's structurizr.sh is at /usr/local/structurizr-cli; the checkout
          # dir is owned by a different uid, so mark it safe for git.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage first, then test the STAGED diff so brand-new (untracked) images count.
          git add images/c4/
          if git diff --cached --quiet; then
            echo "No image change (deterministic PNGs unchanged); nothing to commit."
          else
            # No [skip ci]: this image-only commit re-triggers CI, whose render is
            # deterministic and produces no further diff, so checks go green on HEAD.
            git commit -m "docs(diagrams): regenerate structurizr C4 diagrams"
            git push
          fi
