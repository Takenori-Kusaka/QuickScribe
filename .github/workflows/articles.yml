name: Articles

# 技術記事の校正・図生成の品質ゲート（発信は Zenn 一本。Qiita は不採用）。
# - textlint（preset-ja-technical-writing）で articles/ の日本語校正をゼロエラー必須にする。
# - Mermaid 図（docs/design.md）を CI で SVG/PNG に書き出し、記事が絶対URLで参照する
#   docs/assets/diagrams/ が最新かを検証する。
# - main への push では図を再生成して差分があれば自動コミットする（記事本文と図の乖離防止）。
# 方針の詳細: docs/process/article-publishing-policy.md

on:
  pull_request:
    paths:
      - "articles/**"
      - "docs/design.md"
      - "docs/architecture/**"
      - "docs/assets/diagrams/**"
      - "scripts/render-diagrams.mjs"
      - "scripts/render-structurizr.mjs"
      - "scripts/structurizr-mermaid-config.json"
      - ".textlintrc.json"
      - ".github/workflows/articles.yml"
  push:
    branches: [main]
    paths:
      - "articles/**"
      - "docs/design.md"
      - "docs/architecture/**"
      - "scripts/render-diagrams.mjs"
      - "scripts/render-structurizr.mjs"
      - "scripts/structurizr-mermaid-config.json"
      - ".github/workflows/articles.yml"
  workflow_dispatch:

concurrency:
  group: articles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  textlint:
    name: textlint (articles)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: textlint (preset-ja-technical-writing)
        run: npm run lint:text

  diagrams:
    name: diagrams (mermaid -> svg/png)
    runs-on: ubuntu-22.04
    # contents: write + a token so the auto-commit step can push regenerated images.
    # Without this the push fails and the whole job goes red on main.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: Install Chromium deps for mermaid-cli
        run: npx --yes puppeteer browsers install chrome
      - name: Re-render and auto-commit diagrams (PR and main)
        run: |
          npm run diagrams
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/diagrams/
          # Commit ONLY when an SVG changed. mmdc PNG rasterization is non-deterministic
          # (byte-different every run), so gating on PNG would push a commit on every run
          # (churn) and, previously, fail because the job lacked write permission. The SVG
          # is deterministic text, so it is the source of truth for "did the diagram
          # actually change". No [skip ci]: the image commit re-triggers CI, that run sees
          # no SVG change and makes no commit, so checks go green on HEAD.
          if git diff --cached --name-only -- 'docs/assets/diagrams/*.svg' | grep -q .; then
            git commit -m "docs(diagrams): regenerate mermaid diagrams"
            git push
          else
            echo "No SVG change (only non-deterministic PNG bytes); skipping commit."
            git reset -q --hard
          fi

  structurizr:
    name: structurizr (dsl -> mermaid -> svg/png)
    runs-on: ubuntu-22.04
    # CI is the ONLY place these render (Structurizr CLI needs Java; authors' machines
    # usually lack Java/Docker). So CI generates the images and commits them for you:
    # on a PR it renders and commits back to the PR branch, on main it regenerates.
    # The build fails only when a .dsl does not render (e.g. a DSL syntax error).
    permissions:
      contents: write
    env:
      STRUCTURIZR_CLI_VERSION: v2025.11.09
    steps:
      - uses: actions/checkout@v7
        with:
          # Check out the PR branch itself (not the detached merge ref) so we can push
          # regenerated images back to it. On main pushes this resolves to main.
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install npm dependencies
        run: npm ci
      - name: Install Chromium deps for mermaid-cli
        run: npx --yes puppeteer browsers install chrome
      - name: Download Structurizr CLI
        run: |
          curl -fsSL -o /tmp/structurizr-cli.zip \
            "https://github.com/structurizr/cli/releases/download/${STRUCTURIZR_CLI_VERSION}/structurizr-cli.zip"
          mkdir -p /tmp/structurizr-cli
          unzip -q -o /tmp/structurizr-cli.zip -d /tmp/structurizr-cli
          echo "STRUCTURIZR_CLI=/tmp/structurizr-cli/structurizr.sh" >> "$GITHUB_ENV"
      - name: Render DSL and auto-commit images (PR and main)
        run: |
          # A DSL syntax error makes this step exit non-zero -> the check goes red.
          npm run structurizr
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/diagrams/
          # Commit ONLY when an SVG changed. mmdc PNG rasterization is non-deterministic
          # (byte-different every run), so gating on PNG would push a fresh commit on
          # every CI run (churn). The SVG is deterministic text, so it is the source of
          # truth for "did the diagram actually change". A brand-new diagram shows up as a
          # newly-staged .svg (so it commits); a pure PNG byte-churn shows no .svg diff
          # (so we discard it). No [skip ci]: the image commit re-triggers CI, that run
          # sees no SVG change and makes no commit, so checks go green on HEAD.
          if git diff --cached --name-only -- 'docs/assets/diagrams/*.svg' | grep -q .; then
            git commit -m "docs(diagrams): regenerate structurizr diagrams"
            git push
          else
            echo "No SVG change (only non-deterministic PNG bytes); skipping commit."
            git reset -q --hard
          fi
