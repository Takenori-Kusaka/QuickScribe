name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1" # 毎週月曜に定期スキャン

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4

  cargo-audit:
    name: cargo audit/deny (Rust)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit / cargo-deny / cargo-about
        run: |
          cargo install cargo-audit cargo-deny --locked
          # cargo-about のバイナリは cli フィーチャが必要(無いと `cargo about` が入らない)。
          cargo install cargo-about --locked --features cli
      - name: cargo audit (脆弱性データベース照合)
        working-directory: src-tauri
        # RUSTSEC-2026-0194/0195: quick-xml の XML パース DoS。quick-xml は plist(macOS向け
        # bundler/ビルド系)経由の推移的依存で、QuickScribe は実行時に未信頼XML/plistを解析しない
        # ため攻撃経路に非該当。依存木が patched quick-xml を引いた時点で ignore を外す(#526)。
        run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
      - name: cargo deny advisories (脆弱性/重複 — 衛生課題は v1.0.0)
        working-directory: src-tauri
        run: cargo deny check advisories || true
      - name: cargo deny licenses (ライセンス allowlist 強制 — 法的MUST/ADR-0010)
        working-directory: src-tauri
        run: cargo deny check licenses
      - name: Verify THIRD-PARTY-NOTICES generation (cargo-about/法的MUST)
        working-directory: src-tauri
        run: cargo about generate about.hbs > /dev/null

  npm-audit:
    name: npm audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: npm audit (high以上で警告)
        run: npm audit --audit-level=high || true
