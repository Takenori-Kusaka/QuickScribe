name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 新しいCMake(4.x, windows-latest)は古いlibopus(audiopus_sys同梱)の
# cmake_minimum_required < 3.5 を拒否するため、CMake公式の回避策で最低ポリシー版を指定。
env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  # [検証中] whisper(ggml)の移植性。env系レバー(SOURCE_DATE_EPOCH/WHISPER_NATIVE)は
  # GGML_NATIVE を倒せなかった(CMakeCacheで実証)。まず配布デフォルトで AVX512 が実際に
  # 埋め込まれるかを objdump で確定させ、対処(build.rsパッチ)を決める。

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # whisper移植性修正で whisper.cpp を再ビルドさせるためキャッシュ世代を更新。
          prefix-key: "v3-portable"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config

      - name: Set LIBCLANG_PATH (Windows, for whisper-rs bindgen)
        if: matrix.os == 'windows-latest'
        run: echo "LIBCLANG_PATH=$((Get-Command clang).Source | Split-Path)" >> $env:GITHUB_ENV
        shell: pwsh

      # 注: whisper-rs-sys 0.13.1 は GGML_NATIVE 既定ON(=-march=native)でビルドする(誤解訂正:
      #     GGML_CPU_ALL_VARIANTSは使われていない)。AVX512搭載ランナーで -march=native すると
      #     配布バイナリにAVX512が埋め込まれ、非対応CPU/CPUID誤申告環境でSIGILLする。
      #     対策として top-level env の SOURCE_DATE_EPOCH で GGML_NATIVE を OFF にしている
      #     (docs/research/sources/whisper-cpu-portability.md)。

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Type-check frontend
        run: npm run check

      - name: Frontend unit tests (vitest)
        run: npm test

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build (compile, no bundle)
        run: npx tauri build --no-bundle

  e2e:
    name: e2e (実起動 / Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # whisper移植性修正で whisper.cpp を再ビルドさせるためキャッシュ世代を更新。
          prefix-key: "v3-portable"

      - name: Install Linux dependencies (+ WebKitWebDriver / xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config \
            webkit2gtk-driver \
            xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build app (release binary for E2E)
        run: npx tauri build --no-bundle

      - name: Run E2E (WebdriverIO under xvfb)
        env:
          QUICKSCRIBE_E2E: "1"
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npm run e2e

  transcribe:
    name: transcribe (決定論テスト / Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # whisper移植性修正で whisper.cpp を再ビルドさせるためキャッシュ世代を更新。
          prefix-key: "v3-portable"

      - name: Install dependencies (whisper build + espeak-ng)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config \
            espeak-ng

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons (tauri generate_context にアイコンが必要)
        run: npm run icons

      - name: Cache whisper model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/ggml-tiny.bin
          key: ggml-tiny-bin-v1

      - name: Download tiny whisper model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -L --fail --retry 5 --retry-delay 15 --retry-all-errors \
            -o models/ggml-tiny.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin

      - name: Generate known speech audio (espeak-ng)
        run: espeak-ng "Hello world. This is a test." -w test.wav

      - name: Transcription integration test (decode -> whisper -> text)
        env:
          QS_MODEL_PATH: ${{ github.workspace }}/models/ggml-tiny.bin
          QS_AUDIO_PATH: ${{ github.workspace }}/test.wav
        run: cargo test --manifest-path src-tauri/Cargo.toml --test transcribe_integration -- --nocapture

      # [検証用] 生成された ggml 静的ライブラリに AVX512(zmmレジスタ/EVEX) が埋め込まれて
      # いないかを objdump で直接確認する。zmm が出れば配布バイナリは非AVX512 CPUでSIGILLする。
      - name: Verify ggml binary has no AVX512 (objdump zmm check)
        run: |
          f=$(find src-tauri/target -name CMakeCache.txt -path '*whisper*' | head -1)
          echo "== CMakeCache GGML options =="; grep -iE "GGML_NATIVE|GGML_AVX|march" "$f" 2>/dev/null | sort -u
          libs=$(find src-tauri/target -name 'libggml*.a' -o -name 'libwhisper*.a' | sort -u)
          echo "== libs =="; echo "$libs"
          zmm=0
          for l in $libs; do
            c=$(objdump -d "$l" 2>/dev/null | grep -coE '%zmm[0-9]+')
            y=$(objdump -d "$l" 2>/dev/null | grep -coE '%ymm[0-9]+')
            echo "$l : zmm(AVX512)=$c ymm(AVX/AVX2)=$y"
            zmm=$((zmm + c))
          done
          echo "TOTAL_ZMM=$zmm"
          if [ "$zmm" -gt 0 ]; then echo "❌ AVX512 命令が含まれる(配布リスク)"; else echo "✅ AVX512無し(移植性OK)"; fi
