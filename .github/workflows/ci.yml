name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config

      - name: Set LIBCLANG_PATH (Windows, for whisper-rs bindgen)
        if: matrix.os == 'windows-latest'
        run: echo "LIBCLANG_PATH=$((Get-Command clang).Source | Split-Path)" >> $env:GITHUB_ENV
        shell: pwsh

      # 注: whisper.cppはGGML_CPU_ALL_VARIANTSで複数CPUバリアントを実行時選択する。
      # グローバルCFLAGS=/arch:AVX2はバリアントの/arch指定と衝突しWindowsを壊すため不使用。

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Type-check frontend
        run: npm run check

      - name: Frontend unit tests (vitest)
        run: npm test

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build (compile, no bundle)
        run: npx tauri build --no-bundle

  e2e:
    name: e2e (実起動 / Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies (+ WebKitWebDriver / xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config \
            webkit2gtk-driver \
            xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build app (release binary for E2E)
        run: npx tauri build --no-bundle

      - name: Run E2E (WebdriverIO under xvfb)
        env:
          QUICKSCRIBE_E2E: "1"
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npm run e2e

  transcribe:
    name: transcribe (決定論テスト / Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (whisper build + espeak-ng)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config \
            espeak-ng

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons (tauri generate_context にアイコンが必要)
        run: npm run icons

      - name: Cache whisper model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/ggml-tiny.bin
          key: ggml-tiny-bin-v1

      - name: Download tiny whisper model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -L --fail --retry 5 --retry-delay 15 --retry-all-errors \
            -o models/ggml-tiny.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin

      - name: Generate known speech audio (espeak-ng)
        run: espeak-ng "Hello world. This is a test." -w test.wav

      - name: Transcription integration test (decode -> whisper -> text)
        env:
          QS_MODEL_PATH: ${{ github.workspace }}/models/ggml-tiny.bin
          QS_AUDIO_PATH: ${{ github.workspace }}/test.wav
        run: cargo test --manifest-path src-tauri/Cargo.toml --test transcribe_integration -- --nocapture
