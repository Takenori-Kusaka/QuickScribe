name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 新しいCMake(4.x, windows-latest)は古いlibopus(audiopus_sys同梱)の
# cmake_minimum_required < 3.5 を拒否するため、CMake公式の回避策で最低ポリシー版を指定。
env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  # whisper(ggml)のCPU移植性は AVX512安全ゲート(後述の objdump zmm チェック)で担保する。
  # env系(SOURCE_DATE_EPOCH/WHISPER_NATIVE)では GGML_NATIVE を倒せないため
  # (docs/research/sources/whisper-cpu-portability.md)、成果物にAVX512が入ったらビルドを失敗させる。

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config

      - name: Set LIBCLANG_PATH (Windows, for whisper-rs bindgen)
        if: matrix.os == 'windows-latest'
        run: echo "LIBCLANG_PATH=$((Get-Command clang).Source | Split-Path)" >> $env:GITHUB_ENV
        shell: pwsh

      # 注: whisper-rs-sys 0.13.1 は GGML_NATIVE 既定ON(=-march=native)でビルドする(誤解訂正:
      #     GGML_CPU_ALL_VARIANTSは使われていない)。命令セットがビルドランナーのCPU依存で非決定的。
      #     AVX512混入は transcribe ジョブの「AVX512 safety gate」で検出し失敗させる(配布事故防止)。

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Type-check frontend
        run: npm run check

      - name: Frontend unit tests (vitest)
        run: npm test

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build (compile, no bundle)
        run: npx tauri build --no-bundle

  e2e:
    name: e2e (実起動 / Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies (+ WebKitWebDriver / xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config \
            webkit2gtk-driver \
            xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build app (release binary for E2E)
        run: npx tauri build --no-bundle

      - name: Run E2E (WebdriverIO under xvfb)
        env:
          QUICKSCRIBE_E2E: "1"
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npm run e2e

  transcribe:
    name: transcribe (決定論テスト / Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (whisper build + espeak-ng)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config \
            espeak-ng

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons (tauri generate_context にアイコンが必要)
        run: npm run icons

      - name: Cache whisper model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: models/ggml-tiny.bin
          key: ggml-tiny-bin-v1

      - name: Download tiny whisper model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -L --fail --retry 5 --retry-delay 15 --retry-all-errors \
            -o models/ggml-tiny.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin

      - name: Generate known speech audio (espeak-ng)
        run: espeak-ng "Hello world. This is a test." -w test.wav

      - name: Transcription integration test (decode -> whisper -> text)
        env:
          QS_MODEL_PATH: ${{ github.workspace }}/models/ggml-tiny.bin
          QS_AUDIO_PATH: ${{ github.workspace }}/test.wav
        run: cargo test --manifest-path src-tauri/Cargo.toml --test transcribe_integration -- --nocapture

      # AVX512安全ゲート: whisper-rs-sys は GGML_NATIVE=ON でビルドし、命令セットがビルド
      # ランナーのCPUに依存する(非決定的)。AVX512搭載/CPUID誤申告ランナーでビルドされると
      # 配布バイナリにAVX512(zmm)が混入し、非対応CPUの実ユーザーでSIGILLする
      # (docs/research/sources/whisper-cpu-portability.md)。env系では GGML_NATIVE を倒せない
      # ため、せめて成果物に AVX512 が入ったら CI/release を失敗させ「壊れた配布物が黙って出る」
      # のを防ぐ。zmm(EVEX/AVX512レジスタ)が1つでもあれば失敗。
      - name: AVX512 safety gate (objdump zmm check)
        run: |
          libs=$(find src-tauri/target -name 'libggml*.a' -o -name 'libwhisper*.a' | sort -u)
          zmm=0
          for l in $libs; do
            c=$(objdump -d "$l" 2>/dev/null | grep -coE '%zmm[0-9]+' || true)
            echo "$l : zmm(AVX512)=$c"
            zmm=$((zmm + c))
          done
          echo "TOTAL_ZMM=$zmm"
          if [ "$zmm" -gt 0 ]; then
            echo "::error::ggmlにAVX512命令が混入(zmm=$zmm)。非AVX512 CPUでSIGILLするため配布不可。"
            exit 1
          fi
          echo "✅ AVX512無し(AVX2ベースライン=移植性OK)"
