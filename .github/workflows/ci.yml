name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 新しいCMake(4.x, windows-latest)は古いlibopus(audiopus_sys同梱)の
# cmake_minimum_required < 3.5 を拒否するため、CMake公式の回避策で最低ポリシー版を指定。
env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  # crates.io DLの「HTTP2 framing layer」フレーク対策: HTTP/1.1へ落として多重化を切り、
  # ネットワーク再試行を増やす(curl 8系のHTTP2バグ回避。CIの間欠失敗を抑止)。
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  # whisper(ggml)のCPU移植性は AVX512安全ゲート(後述の objdump zmm チェック)で担保する。
  # env系(SOURCE_DATE_EPOCH/WHISPER_NATIVE)では GGML_NATIVE を倒せないため
  # (docs/research/sources/whisper-cpu-portability.md)、成果物にAVX512が入ったらビルドを失敗させる。

jobs:
  # フロントの静的解析ゲート（#392/#393）。Rust(clippy/rustfmt)は別途段階導入。
  lint:
    name: lint (frontend)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier (format check)
        run: npm run format:check
      - name: Frontend license notices up to date (#394)
        run: |
          npm run licenses
          git diff --exit-code THIRD-PARTY-NOTICES-frontend.md \
            || { echo "::error::THIRD-PARTY-NOTICES-frontend.md が古いです。'npm run licenses' を実行してコミットしてください。"; exit 1; }

  # Rust 静的解析（#392/#393）。段階導入: まずは可視化(continue-on-error)で運用し、
  # 既存の clippy 警告・rustfmt 差分を洗い出してから strict 化する(ADR-0006 段階実装)。
  # strict 化時に continue-on-error を外し、必須ステータスチェックへ昇格する。
  rust-lint:
    name: rust-lint (clippy/rustfmt)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux dependencies (clippy needs to compile)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config
      - name: rustfmt (format check)
        continue-on-error: true
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: clippy (lint)
        continue-on-error: true
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config

      - name: Set LIBCLANG_PATH (Windows, for whisper-rs bindgen)
        if: matrix.os == 'windows-latest'
        run: echo "LIBCLANG_PATH=$((Get-Command clang).Source | Split-Path)" >> $env:GITHUB_ENV
        shell: pwsh

      # 注: whisper-rs-sys 0.13.1 は GGML_NATIVE 既定ON(=-march=native)でビルドする(誤解訂正:
      #     GGML_CPU_ALL_VARIANTSは使われていない)。命令セットがビルドランナーのCPU依存で非決定的。
      #     AVX512混入は transcribe ジョブの「AVX512 safety gate」で検出し失敗させる(配布事故防止)。

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Type-check frontend
        run: npm run check

      - name: Frontend unit tests (vitest)
        if: matrix.os == 'windows-latest'
        run: npm test

      # v1.0.0 カバレッジ計測の可視化(#402 Phase1)。現状は src/lib の純ロジックを計測し
      # レポートをアーティファクト保存(ゲートは段階導入)。Rust側 llvm-cov は後続フェーズ。
      - name: Frontend coverage (ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: npm run coverage

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: coverage/
          if-no-files-found: error

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build (compile, no bundle)
        run: npx tauri build --no-bundle

  e2e:
    name: e2e (実起動 / Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies (+ WebKitWebDriver / xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config \
            webkit2gtk-driver \
            xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Build app (release binary for E2E)
        run: npx tauri build --no-bundle

      - name: Run E2E (WebdriverIO under xvfb)
        env:
          QUICKSCRIBE_E2E: "1"
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npm run e2e

  transcribe:
    name: transcribe (決定論テスト / Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (whisper build + espeak-ng)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config \
            espeak-ng

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons (tauri generate_context にアイコンが必要)
        run: npm run icons

      - name: Cache whisper model
        id: cache-model
        uses: actions/cache@v6
        with:
          path: models/ggml-tiny.bin
          key: ggml-tiny-bin-v1

      - name: Download tiny whisper model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -L --fail --retry 5 --retry-delay 15 --retry-all-errors \
            -o models/ggml-tiny.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin

      - name: Generate known speech audio (espeak-ng)
        run: espeak-ng "Hello world. This is a test." -w test.wav

      - name: Transcription integration test (decode -> whisper -> text)
        env:
          QS_MODEL_PATH: ${{ github.workspace }}/models/ggml-tiny.bin
          QS_AUDIO_PATH: ${{ github.workspace }}/test.wav
        run: cargo test --manifest-path src-tauri/Cargo.toml --test transcribe_integration -- --nocapture

      # AVX512回帰ゲート: [patch]で GGML_NATIVE=OFF を注入し決定的な AVX2 ベースラインに固定した
      # (vendor/whisper-rs-sys-0.13.1 / ADR-0012)。本ゲートはその回帰検出 — 成果物に AVX512(zmm)が
      # 混入したらCIを失敗させ、非対応CPUの実ユーザーでSIGILLする配布事故を防ぐ。
      # (Phase2でAVX512最適化版を作る際は QS_SIMD=avx512 でビルドし、そのジョブはこのゲート対象外にする)
      - name: AVX512 regression gate (objdump zmm check)
        run: |
          # 1) patchが効いて GGML_NATIVE=OFF か(=決定的AVX2)。patchが外れると ON に戻りSIGILLリスク。
          f=$(find src-tauri/target -name CMakeCache.txt -path '*whisper*' | head -1)
          nat=$(grep -E '^GGML_NATIVE:BOOL=' "$f" 2>/dev/null | head -1)
          echo "CMakeCache: $nat"
          if ! echo "$nat" | grep -q 'GGML_NATIVE:BOOL=OFF'; then
            echo "::error::GGML_NATIVE が OFF でない($nat)。vendor patchが効いていない(決定的AVX2でない)。"
            exit 1
          fi
          # 2) 成果物に AVX512(zmm) が無いか(回帰検出)。
          libs=$(find src-tauri/target -name 'libggml*.a' -o -name 'libwhisper*.a' | sort -u)
          zmm=0; ymm=0
          for l in $libs; do
            c=$(objdump -d "$l" 2>/dev/null | grep -coE '%zmm[0-9]+' || true)
            y=$(objdump -d "$l" 2>/dev/null | grep -coE '%ymm[0-9]+' || true)
            echo "$l : zmm(AVX512)=$c ymm(AVX2)=$y"
            zmm=$((zmm + c)); ymm=$((ymm + y))
          done
          echo "TOTAL_ZMM=$zmm TOTAL_YMM=$ymm"
          if [ "$zmm" -gt 0 ]; then
            echo "::error::ggmlにAVX512命令が混入(zmm=$zmm)。非AVX512 CPUでSIGILLするため配布不可。"
            exit 1
          fi
          echo "✅ GGML_NATIVE=OFF / AVX512無し / AVX2有効(ymm=$ymm) = 決定的AVX2ベースライン"
