name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# 新しいCMake(4.x, windows-latest)は古いlibopus(audiopus_sys同梱)の
# cmake_minimum_required < 3.5 を拒否するため、CMake公式の回避策で最低ポリシー版を指定。
env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  release:
    name: release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config

      - name: Set LIBCLANG_PATH (Windows, for whisper-rs bindgen)
        if: matrix.os == 'windows-latest'
        run: echo "LIBCLANG_PATH=$((Get-Command clang).Source | Split-Path)" >> $env:GITHUB_ENV
        shell: pwsh

      # 注: whisper-rs-sys が同梱する whisper.cpp は GGML_CPU_ALL_VARIANTS
      # (AVX/AVX2/AVX512等の複数CPUバリアントを実行時選択)でビルドされる。
      # グローバルな CFLAGS=/arch:AVX2 は各バリアントの /arch 指定と衝突し
      # Windowsビルドを壊すため設定しない。高速化は別途モデル選択/dispatch検証で対応。

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Generate THIRD-PARTY-NOTICES (cargo-about / 法的MUST・ADR-0010)
        shell: bash
        run: |
          cargo install cargo-about --locked
          cd src-tauri
          cargo about generate about.hbs > THIRD-PARTY-NOTICES.txt
          wc -l THIRD-PARTY-NOTICES.txt

      - name: Set version from tag (Cargo.toml = 単一の版ソース)
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          # [package] セクション直下の version 行のみ置換。
          perl -0pi -e 's/^version = "[^"]*"/version = "'"$VERSION"'"/m if !$done++' src-tauri/Cargo.toml
          head -5 src-tauri/Cargo.toml

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 第三者NOTICE(法的MUST)を release/test-build でのみ bundle.resources に追加する
          # 上書き config。base の tauri.conf.json には入れない(コンパイル時の存在検証で
          # --no-bundle のci.ymlまで壊れるため)。
          args: --config src-tauri/tauri.release.conf.json
          tagName: ${{ github.ref_name }}
          releaseName: "QuickScribe ${{ github.ref_name }}"
          releaseBody: "自動アップデート対応リリース。インストーラ/実行パッケージは下記アセット参照。未署名(SmartScreen警告が出る場合あり)。"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
