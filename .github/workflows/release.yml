name: Release

# 起動経路 (#427):
# 1) 手動のタグ push（`v*`）。github.ref_name がタグ。
# 2) release-please.yml から reusable(workflow_call)として呼ぶ。release-please が Release PR
#    マージで作成したタグ+ノートに対し、同一ラン内でバイナリを添付する（PAT不要 / GITHUB_TOKEN）。
#    tauri-action は tagName で既存リリースを見つけてアセットを添付する。releaseBody は渡さない
#    （渡すと既存リリースの本文を上書きし release-please のノートが消えるため / #572）。
on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: "リリースタグ(vX.Y.Z)。release-please から呼ばれる場合に指定。"
        required: true
        type: string

permissions:
  contents: write

# 新しいCMake(4.x, windows-latest)は古いlibopus(audiopus_sys同梱)の
# cmake_minimum_required < 3.5 を拒否するため、CMake公式の回避策で最低ポリシー版を指定。
env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  # crates.io DLの「HTTP2 framing layer」フレーク対策: HTTP/1.1へ落として多重化を切り、
  # ネットワーク再試行を増やす(curl 8系のHTTP2バグ回避。リリースの間欠失敗を抑止)。
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  release:
    name: release (${{ matrix.label }})
    strategy:
      fail-fast: false
      # tauri-action は各ジョブが latest.json を読み足し再アップロードする(複数アーキを1つに統合)。
      # 並行だと read-modify-write が競合するため直列化する。
      max-parallel: 1
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x64
            rust_target: ""
            tauri_args: "--config src-tauri/tauri.release.conf.json"
          - os: windows-latest
            label: windows-x64
            rust_target: x86_64-pc-windows-msvc
            tauri_args: "--config src-tauri/tauri.release.conf.json --target x86_64-pc-windows-msvc"
          - os: windows-latest
            label: windows-arm64
            rust_target: aarch64-pc-windows-msvc
            tauri_args: "--config src-tauri/tauri.release.conf.json --target aarch64-pc-windows-msvc"
    runs-on: ${{ matrix.os }}
    steps:
      # workflow_call 経由(release-please)はタグを明示 checkout。タグ push 経由は github.ref がタグ。
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake \
            libasound2-dev \
            pkg-config

      - name: Set LIBCLANG_PATH (Windows, for whisper-rs bindgen)
        if: matrix.os == 'windows-latest'
        run: echo "LIBCLANG_PATH=$((Get-Command clang).Source | Split-Path)" >> $env:GITHUB_ENV
        shell: pwsh

      # 注: whisper(ggml)は vendor patch で GGML_NATIVE=OFF=決定的AVX2(x64)/NEON(ARM64) / ADR-0012。

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Generate THIRD-PARTY-NOTICES (cargo-about / 法的MUST・ADR-0010)
        shell: bash
        run: |
          cargo install cargo-about --locked --features cli
          cd src-tauri
          cargo about generate about.hbs > THIRD-PARTY-NOTICES.txt
          wc -l THIRD-PARTY-NOTICES.txt

      - name: Set version from tag (Cargo.toml = 単一の版ソース)
        shell: bash
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "Setting version to $VERSION"
          # [package] セクション直下の version 行のみ置換。
          perl -0pi -e 's/^version = "[^"]*"/version = "'"$VERSION"'"/m if !$done++' src-tauri/Cargo.toml
          head -5 src-tauri/Cargo.toml

      # Windows ARM64 のみ: ggml は ARM で MSVC不可・Clang必須(ggml-cpu/CMakeLists.txt)。
      # x64ホスト→ARM64の MSVCクロス環境(INCLUDE/LIB)を整え、whisper.cppを ninja+clang-cl でビルドする。
      - name: Setup MSVC ARM64 cross env (x64 host -> ARM64)
        if: matrix.rust_target == 'aarch64-pc-windows-msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64
      - name: Set ARM64 whisper build env (clang-cl)
        if: matrix.rust_target == 'aarch64-pc-windows-msvc'
        shell: bash
        run: |
          {
            echo "CMAKE_GENERATOR=Ninja"
            echo "CMAKE_C_COMPILER=clang-cl"
            echo "CMAKE_CXX_COMPILER=clang-cl"
            echo "CMAKE_C_FLAGS=--target=arm64-pc-windows-msvc"
            echo "CMAKE_CXX_FLAGS=--target=arm64-pc-windows-msvc"
          } >> "$GITHUB_ENV"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 第三者NOTICE(法的MUST)を release/test-build でのみ bundle.resources に追加する
          # 上書き config。base の tauri.conf.json には入れない(コンパイル時の存在検証で
          # --no-bundle のci.ymlまで壊れるため)。x64/ARM64で --target を付与(matrix)。
          args: ${{ matrix.tauri_args }}
          # release-please が作成したリリースを tagName で発見し、アセットのみ添付する。
          # releaseBody は渡さない: 渡すと tauri-action が既存リリースの本文を固定文で上書きし、
          # release-please が生成したノートが消える(#572 で実際に v1.0.0 で発生し手動復旧した)。
          # SmartScreen 未署名の注記は README / ダウンロードページ / CHANGELOG 側に持たせる。
          # 手動タグ push 時は本 action が新規作成する(その場合は本文無し。通常は release-please 経由)。
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "QuickScribe ${{ inputs.tag || github.ref_name }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          # NSISのみのため updater は setup.exe を指す(msi誤参照を防ぐ)。
          updaterJsonPreferNsis: true

  # リリースノート復旧(#572): tauri-action は既存リリース(release-please作成)の本文を空で
  # 上書きするため、ビルド後に CHANGELOG の当該版節を本文へ戻す。毎回の手動復旧を廃止する恒久対応。
  restore-notes:
    name: リリースノート復旧 (release-please生成を保持 / #572)
    needs: release
    if: needs.release.result == 'success'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - name: Restore release notes from CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VER="${TAG#v}"
          # CHANGELOG から当該版の節(## [VER] ... 次の ## [ まで)を抽出。index()で正規表現エスケープ回避。
          awk -v ver="$VER" '
            index($0, "## [" ver "]") == 1 { f = 1 }
            f && index($0, "## [") == 1 && index($0, "## [" ver "]") != 1 { exit }
            f { print }
          ' CHANGELOG.md > notes.md
          if [ -s notes.md ]; then
            gh release edit "$TAG" --notes-file notes.md \
              && echo "restored release notes for $TAG" \
              || echo "::warning::ノート復旧に失敗(リリース/バイナリは正常)"
          else
            echo "::warning::CHANGELOG に $VER の節が見つからずノート復旧をスキップ"
          fi
