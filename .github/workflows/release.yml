name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file \
            clang \
            libclang-dev \
            cmake

      - name: Set LIBCLANG_PATH (Windows, for whisper-rs bindgen)
        if: matrix.os == 'windows-latest'
        run: echo "LIBCLANG_PATH=$((Get-Command clang).Source | Split-Path)" >> $env:GITHUB_ENV
        shell: pwsh

      # whisper.cpp(ggml)をAVX2/FMA/F16C有効でビルド(SSE2スカラ実行の遅さを解消)。
      # AVX2必須=Haswell(2013)以降が対象。
      - name: Set CPU optimization flags (Linux, AVX2)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          echo "CFLAGS=-mavx2 -mfma -mf16c -mavx" >> "$GITHUB_ENV"
          echo "CXXFLAGS=-mavx2 -mfma -mf16c -mavx" >> "$GITHUB_ENV"

      - name: Set CPU optimization flags (Windows, AVX2)
        if: matrix.os == 'windows-latest'
        run: |
          echo "CFLAGS=/arch:AVX2" >> $env:GITHUB_ENV
          echo "CXXFLAGS=/arch:AVX2" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: npm run icons

      - name: Set version from tag (Cargo.toml = 単一の版ソース)
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          # [package] セクション直下の version 行のみ置換。
          perl -0pi -e 's/^version = "[^"]*"/version = "'"$VERSION"'"/m if !$done++' src-tauri/Cargo.toml
          head -5 src-tauri/Cargo.toml

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QuickScribe ${{ github.ref_name }}"
          releaseBody: "自動アップデート対応リリース。インストーラ/実行パッケージは下記アセット参照。未署名(SmartScreen警告が出る場合あり)。"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
