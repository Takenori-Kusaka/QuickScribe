name: perf-bench

# 非機能（パフォーマンス）ベンチ（#403）。ローカル whisper の文字起こし RTF（実時間比）と
# ピークメモリ(RSS)を固定音源で計測し、結果をアーティファクト＋ジョブサマリに残す。
# 手動(workflow_dispatch)＋リリース公開時に実行。CI(PR)は重くしないため分離。
on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

env:
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  transcribe-rtf:
    name: 文字起こし RTF / メモリ (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies (whisper build + espeak-ng + ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libxdo-dev build-essential file clang libclang-dev cmake \
            libasound2-dev pkg-config espeak-ng ffmpeg time

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate icons (tauri generate_context にアイコンが必要)
        run: npm run icons

      - name: Cache whisper model
        id: cache-model
        uses: actions/cache@v6
        with:
          path: models/ggml-tiny.bin
          key: ggml-tiny-bin-v1
      - name: Download tiny whisper model
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -L --fail --retry 5 --retry-delay 15 --retry-all-errors \
            -o models/ggml-tiny.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin

      - name: Generate fixed bench audio (~固定長)
        run: |
          # 一定量の既知発話を生成（RTF を安定させるため文章を長めに）。
          espeak-ng "This is a performance benchmark for QuickScribe. \
            The quick brown fox jumps over the lazy dog. \
            Speech recognition latency is measured as a real time factor. \
            We repeat this paragraph to obtain a stable measurement window. \
            The quick brown fox jumps over the lazy dog again and again." \
            -s 150 -w bench.wav
          DUR=$(ffprobe -v error -show_entries format=duration -of csv=p=0 bench.wav)
          echo "AUDIO_DURATION=$DUR" >> "$GITHUB_ENV"
          echo "音源長: ${DUR}s"

      - name: Build test binary (compile excluded from timing)
        run: cargo test --manifest-path src-tauri/Cargo.toml --test transcribe_integration --no-run

      - name: Measure transcription (RTF + peak RSS)
        env:
          QS_MODEL_PATH: ${{ github.workspace }}/models/ggml-tiny.bin
          QS_AUDIO_PATH: ${{ github.workspace }}/bench.wav
          # 精度(CER)計算のため認識テキストをファイルへ出力させる(#403)。
          QS_TRANSCRIPT_OUT: ${{ github.workspace }}/transcript.txt
        run: |
          /usr/bin/time -v cargo test --manifest-path src-tauri/Cargo.toml \
            --test transcribe_integration -- --nocapture 2> time.txt || { cat time.txt; exit 1; }
          ELAPSED_RAW=$(grep "Elapsed (wall clock)" time.txt | awk '{print $NF}')
          MAXRSS_KB=$(grep "Maximum resident set size" time.txt | awk '{print $NF}')
          # m:ss(.ss) または h:mm:ss を秒へ。
          ELAPSED_S=$(echo "$ELAPSED_RAW" | awk -F: '{ if (NF==3) print $1*3600+$2*60+$3; else print $1*60+$2 }')
          RTF=$(awk -v e="$ELAPSED_S" -v d="$AUDIO_DURATION" 'BEGIN{ if (d>0) printf "%.3f", e/d; else print "n/a" }')
          MAXRSS_MB=$(awk -v k="$MAXRSS_KB" 'BEGIN{ printf "%.1f", k/1024 }')
          {
            echo "# QuickScribe 文字起こしベンチ (ggml-tiny / Linux x64 AVX2)"
            echo ""
            echo "| 指標 | 値 |"
            echo "|---|---|"
            echo "| 音源長 | ${AUDIO_DURATION}s |"
            echo "| 経過(計測区間, コンパイル除く) | ${ELAPSED_S}s |"
            echo "| **RTF (実時間比)** | **${RTF}** |"
            echo "| ピークメモリ (RSS) | ${MAXRSS_MB} MB |"
            echo ""
            echo "_注: cargo test 実行のオーバーヘッドを含む概算。RTF<1.0 が実時間以内の目安。_"
          } | tee perf-report.md
          cat perf-report.md >> "$GITHUB_STEP_SUMMARY"

      # 精度(CER)ベンチ(#403): 既知の英語発話に対する文字誤り率。espeak 生成の高品質英語音声を
      # ggml-tiny で認識し、参照文との CER を測る。パイプライン回帰の検知が目的（実運用精度の
      # 主張ではない。実データ(JSUT/CSJ)による日本語精度は #26 で別途）。
      - name: Measure accuracy (CER, English)
        env:
          # espeak へ渡した参照文と一致させる（正規化して比較）。
          REF_TEXT: >-
            This is a performance benchmark for QuickScribe.
            The quick brown fox jumps over the lazy dog.
            Speech recognition latency is measured as a real time factor.
            We repeat this paragraph to obtain a stable measurement window.
            The quick brown fox jumps over the lazy dog again and again.
        run: |
          python3 - <<'PY' | tee -a perf-report.md
          import os, re
          def norm(s):
              s = s.lower()
              s = re.sub(r"[^a-z0-9\s]", " ", s)      # 記号除去
              return re.sub(r"\s+", " ", s).strip()
          def cer(ref, hyp):
              # 文字レベル Levenshtein 距離 / 参照長。
              r, h = list(ref), list(hyp)
              dp = list(range(len(h) + 1))
              for i in range(1, len(r) + 1):
                  prev, dp[0] = dp[0], i
                  for j in range(1, len(h) + 1):
                      cur = dp[j]
                      dp[j] = min(dp[j] + 1, dp[j-1] + 1, prev + (r[i-1] != h[j-1]))
                      prev = cur
              return dp[len(h)] / max(1, len(r))
          ref = norm(os.environ["REF_TEXT"])
          try:
              hyp = norm(open("transcript.txt", encoding="utf-8").read())
          except FileNotFoundError:
              print("\n_精度: transcript 未出力のためスキップ_"); raise SystemExit(0)
          rate = cer(ref, hyp)
          print("")
          print("| 精度指標 | 値 |")
          print("|---|---|")
          print(f"| 参照文字数(正規化) | {len(ref)} |")
          print(f"| **CER (英語・文字誤り率)** | **{rate*100:.1f}%** |")
          print("")
          print("_注: espeak合成の英語音声に対する回帰指標。日本語精度は実データで #26 にて別途。_")
          PY
          cat perf-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload perf report
        uses: actions/upload-artifact@v7
        with:
          name: perf-report
          path: perf-report.md
          if-no-files-found: error

  # 日本語精度ベンチ(#26 / #403): 実データ(本人音読のPD作品)に対する CER(文字誤り率)を、
  # モデル別(tiny/base/kotoba-q5)に計測する。モデルカタログ精選(不要な選択肢を増やさない)と
  # 精度回帰の検知が目的。ルビ混入により絶対値は悲観側＝相対/回帰指標として扱う(fixtures/README参照)。
  ja-accuracy:
    name: 日本語精度 CER (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install build dependencies (whisper build)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libxdo-dev build-essential file clang libclang-dev cmake \
            libasound2-dev pkg-config

      - name: Cache whisper models (ja-accuracy)
        id: cache-ja-models
        uses: actions/cache@v6
        with:
          path: models
          key: ja-accuracy-models-tiny-base-kotobaq5-v1
      - name: Download models (tiny / base / kotoba-q5)
        if: steps.cache-ja-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          dl() { curl -L --fail --retry 5 --retry-delay 15 --retry-all-errors -o "$1" "$2"; }
          dl models/ggml-tiny.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.bin
          dl models/ggml-base.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin
          dl models/ggml-kotoba-whisper-v2.0-q5_0.bin https://huggingface.co/kotoba-tech/kotoba-whisper-v2.0-ggml/resolve/main/ggml-kotoba-whisper-v2.0-q5_0.bin

      - name: Build test binary (compile excluded from run loop)
        run: cargo test --manifest-path src-tauri/Cargo.toml --test transcribe_integration --no-run

      - name: Measure CER per model x sample
        run: |
          FIX=src-tauri/tests/fixtures/ja-accuracy
          SLUGS="gingatetsudo-no-yoru kumonoito wagahaiha-neko-dearu"
          MODEL_IDS="tiny base kotoba-q5"
          model_file() {
            case "$1" in
              tiny) echo models/ggml-tiny.bin;;
              base) echo models/ggml-base.bin;;
              kotoba-q5) echo models/ggml-kotoba-whisper-v2.0-q5_0.bin;;
            esac
          }
          : > cer.tsv
          for slug in $SLUGS; do
            for mid in $MODEL_IDS; do
              QS_LANG=ja \
              QS_MODEL_PATH="$(model_file "$mid")" \
              QS_AUDIO_PATH="$FIX/$slug/audio.opus" \
              QS_TRANSCRIPT_OUT="hyp-$slug-$mid.txt" \
                cargo test --manifest-path src-tauri/Cargo.toml \
                  --test transcribe_integration -- --nocapture >/dev/null 2>&1
              CER=$(python3 scripts/cer_ja.py "$FIX/$slug/reference.txt" "hyp-$slug-$mid.txt" | cut -f1)
              printf "%s\t%s\t%s\n" "$slug" "$mid" "$CER" >> cer.tsv
            done
          done
          python3 - <<'PY' | tee ja-accuracy-report.md
          import collections
          rows=collections.defaultdict(dict)
          models=[]
          for line in open("cer.tsv"):
              slug,mid,cer=line.rstrip("\n").split("\t")
              rows[slug][mid]=float(cer)
              if mid not in models: models.append(mid)
          print("# QuickScribe 日本語精度ベンチ (CER / Linux)")
          print()
          print("| サンプル | " + " | ".join(models) + " |")
          print("|---|" + "---|"*len(models))
          sums={m:0.0 for m in models}
          for slug,vals in rows.items():
              cells=[]
              best=min(vals.values())
              for m in models:
                  v=vals[m]; sums[m]+=v
                  cells.append(("**%.1f%%**" if v==best else "%.1f%%") % (v*100))
              print(f"| {slug} | " + " | ".join(cells) + " |")
          n=len(rows)
          avg=[sums[m]/n for m in models]
          bestavg=min(avg)
          cells=[("**%.1f%%**" if a==bestavg else "%.1f%%") % (a*100) for a in avg]
          print("| **平均** | " + " | ".join(cells) + " |")
          print()
          print("_注: 本人音読のPD作品3点。原文へのルビ混入で絶対CERは悲観側＝相対/回帰指標。太字=各行の最良。_")
          PY
          cat ja-accuracy-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ja-accuracy report
        uses: actions/upload-artifact@v7
        with:
          name: ja-accuracy-report
          path: ja-accuracy-report.md
          if-no-files-found: error

  # 起動時間ベンチ(#403 案A): run() 開始→フロント ready(onMount) の経過をアプリが記録し、
  # CI は xvfb でヘッドレス起動→ログ(perf-startup.txt)を回収する（外部計時器は不要＝突合方式）。
  startup-time:
    name: 起動時間 (Linux, xvfb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux dependencies (+xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libxdo-dev build-essential file clang libclang-dev cmake \
            libasound2-dev pkg-config xvfb
      - run: npm ci
      - name: Generate icons
        run: npm run icons
      - name: Build app (no bundle)
        run: npx tauri build --no-bundle
      - name: Measure startup time (xvfb)
        env:
          QS_PERF_STARTUP: "1"
        run: |
          BIN=$(find src-tauri/target/release -maxdepth 1 -type f -executable -iname 'quickscribe' | head -1)
          if [ -z "$BIN" ]; then echo "::error::app binary not found"; ls -la src-tauri/target/release; exit 1; fi
          echo "binary: $BIN"
          LOG="$HOME/.local/share/QuickScribe/logs/perf-startup.txt"
          rm -f "$LOG"
          # ヘッドレス表示で起動 → onMount で report_startup が LOG を書く → 回収 → 終了。
          xvfb-run -a "$BIN" >/tmp/app.out 2>&1 &
          APP_PID=$!
          for _ in $(seq 1 40); do [ -f "$LOG" ] && break; sleep 1; done
          kill "$APP_PID" 2>/dev/null || true
          if [ -f "$LOG" ]; then
            MS=$(sed -n 's/^startup_ms=//p' "$LOG")
            {
              echo "# QuickScribe 起動時間 (Linux x64 / xvfb)"
              echo ""
              echo "| 指標 | 値 |"
              echo "|---|---|"
              echo "| **起動時間 (run()→UI ready)** | **${MS} ms** |"
              echo ""
              echo "_注: プロセス起動(run 入口)からフロント onMount までの経過。ヘッドレス表示(xvfb)での計測。_"
            } | tee startup-report.md
            cat startup-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::perf-startup.txt 未生成（表示/依存の問題の可能性）。ログ:"; cat /tmp/app.out || true
            exit 1
          fi
      - name: Upload startup report
        uses: actions/upload-artifact@v7
        with:
          name: startup-report
          path: startup-report.md
          if-no-files-found: warn
