name: Screenshots

# README/サイト用スクリーンショットを自動生成して docs/assets を更新する。
# フロント(Svelte)を Vite で起動し Playwright でヘッドレス描画(Tauri APIはモック)。
# Rust/cargo/MSVC・マイク不要で ubuntu ランナー完結。
# 手動(workflow_dispatch)で実行する。release:published はタウリの GITHUB_TOKEN 発行イベントでは
# 起動しないため信頼できず、代わりに手動＋タグpushで回す(#387/#396)。
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Generate screenshots
        run: npm run screenshots

      - name: Install ffmpeg (for demo GIF)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate demo GIF
        run: npm run demo:gif

      # main はブランチ保護のため直push不可。差分があれば PR を作成/更新する(全5枚+GIF)。
      - name: Open PR with updated screenshots
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            docs/assets/screenshot-*.png
            docs/assets/demo.gif
          branch: chore/screenshots-auto
          delete-branch: true
          commit-message: "chore(assets): スクリーンショット/デモGIF自動更新"
          title: "chore(assets): スクリーンショット/デモGIF自動更新"
          body: |
            CI(Vite+Playwright+ffmpeg)が生成した最新スクリーンショット/デモGIF。README/サイト用。
            マージ前に見た目を確認してください。
