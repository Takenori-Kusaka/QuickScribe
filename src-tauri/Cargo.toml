[package]
name = "quickscribe"
version = "0.0.1"
description = "思考整理・自己理解のためのローカル完結ボイスジャーナル"
authors = ["Takenori Kusaka"]
edition = "2021"

[lib]
name = "quickscribe_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-global-shortcut = "2"
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = "0.4"
dirs = "5"
# 文字起こし(ローカル whisper.cpp / ADR-0002)。whisper-rs が whisper.cpp をビルドする。
whisper-rs = "0.14"
# WAV(16kHz mono)の読み込み。音声ファイル入力(S1.6)とE2Eの決定論化に使う。
hound = "3"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
