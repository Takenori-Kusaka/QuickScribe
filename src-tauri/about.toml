# cargo-about 設定 — 配布バイナリに含まれる依存のライセンス帰属(THIRD-PARTY-NOTICES)を生成する。
# 実行: cargo about generate about.hbs > THIRD-PARTY-NOTICES.txt (CI release.yml / test-build.yml)。
# 法的MUST(ADR-0010): 生成物を tauri bundle.resources で配布物に同梱する。

# 配布物に含まれるライセンスとして許可するもの（deny.toml と整合）。
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "CC0-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OpenSSL",
]

# 開発専用依存は配布物に含まれないため帰属対象から除外する。
ignore-dev-dependencies = true
# ビルド時のみの依存も配布物に含まれない。
ignore-build-dependencies = true
